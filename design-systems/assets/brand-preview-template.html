<!DOCTYPE html>
<html lang="__LANG__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Systems Preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0f0f;
  color: #e8e8e8;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  padding: 70px 24px 140px;
  min-height: 100vh;
}

/* ── TOPBAR ────────────────────────────────────────── */
.ds-topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 200;
}
.ds-logo {
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #e8e8e8;
}
.ds-logo span { color: #6ee7b7; }
.ds-count {
  font-size: 0.8rem;
  color: #888;
  font-variant-numeric: tabular-nums;
}

/* ── CATEGORY FILTER ────────────────────────────────── */
.filter-bar {
  position: sticky;
  top: 56px;
  z-index: 150;
  display: flex;
  gap: 8px;
  padding: 16px 0 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-pill {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: #aaa;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-pill:hover { border-color: rgba(255,255,255,0.2); color: #ddd; }
.filter-pill.active {
  background: rgba(110,231,183,0.12);
  border-color: rgba(110,231,183,0.3);
  color: #6ee7b7;
}

/* ── CARD GRID ────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* ── BRAND CARD ────────────────────────────────── */
.brand-card {
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.15s;
  background: #1a1a1a;
}
.brand-card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}
.brand-card.selected {
  border-color: #6ee7b7;
  transform: translateY(-2px);
  box-shadow: 0 0 0 1px #6ee7b7, 0 8px 30px rgba(110,231,183,0.1);
}

.card-thumbnail {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  overflow: hidden;
  background: #111;
}
.card-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumbnail .img-fallback {
  display: none;
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 700;
  opacity: 0.3;
}

.card-info {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: #e8e8e8;
}
.card-cat {
  font-size: 0.7rem;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
}
.card-style {
  font-size: 0.78rem;
  color: #888;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-palette {
  display: flex;
  gap: 5px;
  margin-top: 4px;
}
.card-swatch {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* ── CHECK BADGE ────────────────────────────────── */
.check-badge {
  position: absolute;
  top: 10px; right: 10px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #6ee7b7;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.brand-card.selected .check-badge { display: flex; }
.check-badge svg { width: 14px; height: 14px; }

/* ── SUBMIT BAR ────────────────────────────────── */
.submit-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 0 24px;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 200;
}
.submit-btn {
  padding: 12px 32px;
  border: none;
  border-radius: 8px;
  background: #6ee7b7;
  color: #0a0a0a;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.submit-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.submit-btn:not(:disabled):hover { opacity: 0.85; }
.submit-btn:not(:disabled):active { transform: scale(0.97); }
.submit-hint {
  font-size: 0.78rem;
  color: #666;
}
.submit-success {
  color: #6ee7b7;
  font-size: 0.9rem;
  font-weight: 600;
}

/* ── RESPONSIVE ────────────────────────────────── */
@media (max-width: 640px) {
  .card-grid { grid-template-columns: 1fr; }
  body { padding: 66px 12px 130px; }
}
</style>
</head>
<body>

<div class="ds-topbar">
  <div class="ds-logo">Design<span>Systems</span></div>
  <div class="ds-count" id="countLabel">54 styles</div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="card-grid" id="cardGrid"></div>

<div class="submit-bar" id="submitBar">
  <span class="submit-hint" id="submitHint">选择一个品牌设计风格</span>
  <button class="submit-btn" id="submitBtn" disabled onclick="submitSelection()">
    告诉 Agent →
  </button>
</div>

<script>
const PORT = __RECEIVER_PORT__;
const brands = JSON.parse('__BRANDS_JSON__');
let selectedBrand = null;

// ── RENDER CARDS ──────────────────────────────────
const categories = [...new Set(brands.map(b => b.cat))].sort();
const filterBar = document.getElementById('filterBar');
const cardGrid = document.getElementById('cardGrid');
const countLabel = document.getElementById('countLabel');

// Filter pills
const pills = [{ cat: 'all', label: '全部' }];
categories.forEach(c => pills.push({ cat: c, label: catLabel(c) }));

pills.forEach(p => {
  const pill = document.createElement('div');
  pill.className = 'filter-pill' + (p.cat === 'all' ? ' active' : '');
  pill.textContent = p.label;
  pill.onclick = () => filterBy(p.cat, pill);
  filterBar.appendChild(pill);
});

function catLabel(c) {
  const map = {
    'AI & ML': 'AI & ML', 'Developer': '开发者工具', 'Infra': '基础设施',
    'Design': '设计工具', 'Fintech': '金融科技', 'Enterprise': '企业级', 'Payments': '支付',
    'Other': '其他'
  };
  return map[c] || c;
}

function filterBy(cat, pillEl) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pillEl.classList.add('active');
  const cards = document.querySelectorAll('.brand-card');
  let visible = 0;
  cards.forEach(card => {
    const show = cat === 'all' || card.dataset.cat === cat;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  countLabel.textContent = visible + ' styles';
}

// Render brand cards
brands.forEach(b => {
  const card = document.createElement('div');
  card.className = 'brand-card';
  card.dataset.cat = b.cat;
  card.dataset.dir = b.dir;
  card.innerHTML = `
    <div class="card-thumbnail" style="background: ${b.bg}">
      <img src="${b.img}" alt="${b.name}" loading="lazy"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="img-fallback" style="color: ${b.ink}; background: ${b.bg}">${b.name[0]}</div>
      <div class="check-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="card-info">
      <div class="card-top-row">
        <span class="card-name">${b.name}</span>
        <span class="card-cat">${b.cat}</span>
      </div>
      <div class="card-style">${b.style || b.dir}</div>
      <div class="card-palette">
        <span class="card-swatch" style="background: ${b.bg}" title="BG"></span>
        <span class="card-swatch" style="background: ${b.ink}" title="Ink"></span>
        <span class="card-swatch" style="background: ${b.accent}" title="Accent"></span>
      </div>
    </div>
  `;
  card.onclick = () => selectCard(card, b);
  cardGrid.appendChild(card);
});

function selectCard(card, brand) {
  document.querySelectorAll('.brand-card.selected').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedBrand = brand;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitHint').textContent = `已选: ${brand.name}`;
}

// ── SUBMIT ──────────────────────────────────
async function submitSelection() {
  if (!selectedBrand) return;
  const payload = JSON.stringify({ brand: selectedBrand.name, dir: selectedBrand.dir });
  const bar = document.getElementById('submitBar');

  try {
    const resp = await fetch('http://localhost:' + PORT + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: payload
    });
    if (resp.ok) {
      bar.innerHTML = '<span class="submit-success">✓ 已发送给 Agent</span>';
    }
  } catch (_) {
    // Fallback: clipboard
    try {
      await navigator.clipboard.writeText(payload);
      bar.innerHTML = '<span class="submit-success">✓ 已复制到剪贴板，请粘贴给 Agent</span>';
    } catch (__) {
      // Final fallback: textarea
      const ta = document.createElement('textarea');
      ta.value = payload;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      bar.innerHTML = '<span class="submit-success">✓ 已复制到剪贴板，请粘贴给 Agent</span>';
    }
  }
}
</script>
</body>
</html>
